<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Brand Color Palette Generator – Create Your Brand Colors</title>
  <meta name="description" content="Generate professional brand color palettes for your Nigerian business. Get hex codes and export options.">
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --navy:#0A0F2C; --navy-mid:#111A45; --gold:#C9A84C; --gold-lt:#E2C07A; --cream:#FAF6ED; --white:#FFFFFF; --grey:#8A8FA8; --success:#22C55E; --font-display:'Cormorant Garamond',Georgia,serif; --font-body:'DM Sans',sans-serif; }
    body { background:var(--navy); color:var(--cream); font-family:var(--font-body); font-size:16px; line-height:1.7; overflow-x:hidden; }
    body::before { content:''; position:fixed; inset:0; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events:none; opacity:0.6; }
    .container { max-width:800px; margin:0 auto; padding:8rem 5% 4rem; position:relative; z-index:1; }
    h1 { font-family:var(--font-display); font-size:2.5rem; color:var(--white); text-align:center; margin-bottom:0.5rem; }
    h1 em { color:var(--gold-lt); font-style:italic; }
    .subtitle { text-align:center; color:var(--grey); margin-bottom:2rem; }
    .tool-box { background:var(--navy-mid); border:1px solid rgba(201,168,76,0.2); border-radius:16px; padding:2rem; }
    .input-group { margin-bottom:1.5rem; }
    .input-group label { display:block; font-size:0.75rem; color:var(--gold); text-transform:uppercase; letter-spacing:0.1em; margin-bottom:0.5rem; }
    .input-group select { width:100%; padding:1rem; background:var(--navy); border:1px solid rgba(201,168,76,0.2); border-radius:8px; color:var(--cream); }
    .generate-btn { width:100%; padding:1rem; background:var(--gold); color:var(--navy); font-weight:700; text-transform:uppercase; letter-spacing:0.08em; border:none; border-radius:8px; cursor:pointer; }
    .palette-display { display:none; margin-top:2rem; }
    .palette-display.show { display:block; }
    .palette-name { font-family:var(--font-display); font-size:1.5rem; color:var(--white); margin-bottom:1.5rem; text-align:center; }
    .color-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:1rem; }
    .color-card { border-radius:12px; overflow:hidden; }
    .color-swatch { height:100px; display:flex; align-items:center; justify-content:center; font-size:2rem; }
    .color-info { padding:1rem; text-align:center; }
    .color-name { font-size:0.85rem; color:var(--white); margin-bottom:0.3rem; }
    .color-hex { font-size:0.75rem; color:var(--grey); cursor:pointer; }
    .color-hex:hover { color:var(--gold); }
    .copy-all { display:block; text-align:center; background:rgba(201,168,76,0.15); border:1px solid var(--gold); color:var(--gold); padding:0.8rem; border-radius:8px; margin-top:1.5rem; cursor:pointer; }
    .copy-all:hover { background:var(--gold); color:var(--navy); }
    footer { text-align:center; padding:2rem; font-size:0.8rem; color:var(--grey); }
  </style>
</head>
<body>
  <div class="container">
    <h1>Brand Colors <em>Generator</em></h1>
    <p class="subtitle">Create professional color palettes for your brand</p>

    <div class="tool-box">
      <form id="paletteForm">
        <div class="input-group">
          <label>Industry/Vibe</label>
          <select id="vibe">
            <option value="corporate">Corporate & Professional</option>
            <option value="creative">Creative & Modern</option>
            <option value="luxury">Luxury & Premium</option>
            <option value="friendly">Friendly & Startup</option>
            <option value="bold">Bold & Energetic</option>
            <option value="minimal">Minimal & Clean</option>
          </select>
        </div>
        <button type="submit" class="generate-btn">Generate Palette</button>
      </form>

      <div class="palette-display" id="paletteDisplay">
        <h3 class="palette-name" id="paletteName">Your Brand Palette</h3>
        <div class="color-grid" id="colorGrid"></div>
        <div class="copy-all" onclick="copyAllColors()">📋 Copy All Hex Codes</div>
      </div>
    </div>
  </div>

  <footer>
    <p>&copy; 2026 Hephzibah Media. All rights reserved.</p>
  </footer>

  <script>
    const palettes = {
      corporate: { name: 'Corporate Trust', colors: [
        { name: 'Primary Navy', hex: '#0A0F2C' },
        { name: 'Secondary Blue', hex: '#1E3A5F' },
        { name: 'Accent Gold', hex: '#C9A84C' },
        { name: 'Light Grey', hex: '#E8E8E8' },
        { name: 'White', hex: '#FFFFFF' }
      ]},
      creative: { name: 'Creative Bold', colors: [
        { name: 'Primary Purple', hex: '#6B46C1' },
        { name: 'Secondary Pink', hex: '#EC4899' },
        { name: 'Accent Yellow', hex: '#F59E0B' },
        { name: 'Light Lavender', hex: '#E9D5FF' },
        { name: 'White', hex: '#FFFFFF' }
      ]},
      luxury: { name: 'Luxury Premium', colors: [
        { name: 'Primary Black', hex: '#1A1A1A' },
        { name: 'Secondary Gold', hex: '#C9A84C' },
        { name: 'Accent Cream', hex: '#F5E6C8' },
        { name: 'Dark Grey', hex: '#333333' },
        { name: 'White', hex: '#FFFFFF' }
      ]},
      friendly: { name: 'Startup Friendly', colors: [
        { name: 'Primary Orange', hex: '#F97316' },
        { name: 'Secondary Teal', hex: '#14B8A6' },
        { name: 'Accent Yellow', hex: '#FBBF24' },
        { name: 'Light Orange', hex: '#FFEDD5' },
        { name: 'White', hex: '#FFFFFF' }
      ]},
      bold: { name: 'Bold Energy', colors: [
        { name: 'Primary Red', hex: '#DC2626' },
        { name: 'Secondary Black', hex: '#18181B' },
        { name: 'Accent White', hex: '#FAFAFA' },
        { name: 'Dark Red', hex: '#991B1B' },
        { name: 'Grey', hex: '#71717A' }
      ]},
      minimal: { name: 'Minimal Clean', colors: [
        { name: 'Primary Charcoal', hex: '#27272A' },
        { name: 'Secondary Light Grey', hex: '#A1A1AA' },
        { name: 'Accent Black', hex: '#18181B' },
        { name: 'Off White', hex: '#FAFAFA' },
        { name: 'White', hex: '#FFFFFF' }
      ]}
    };

    let currentColors = [];

    document.getElementById('paletteForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const vibe = document.getElementById('vibe').value;
      const palette = palettes[vibe];
      
      currentColors = palette.colors;
      
      document.getElementById('paletteName').textContent = palette.name;
      document.getElementById('colorGrid').innerHTML = palette.colors.map(function(c, i) {
        return '<div class="color-card"><div class="color-swatch" style="background:' + c.hex + ';">' + (i === 0 ? '🎨' : '') + '</div><div class="color-info"><div class="color-name">' + c.name + '</div><div class="color-hex" onclick="copyHex(\'' + c.hex + '\', this)">' + c.hex + '</div></div></div>';
      }).join('');
      
      document.getElementById('paletteDisplay').classList.add('show');
    });

    function copyHex(hex, el) {
      navigator.clipboard.writeText(hex);
      el.textContent = 'Copied!';
      setTimeout(function() {
        el.textContent = hex;
      }, 1500);
    }

    function copyAllColors() {
      const hexCodes = currentColors.map(function(c) { return c.name + ': ' + c.hex; }).join('\n');
      navigator.clipboard.writeText(hexCodes);
      alert('All colors copied to clipboard!');
    }
  </script>
</body>
</html>
