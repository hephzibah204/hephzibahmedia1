<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Client Portal Login – Hephzibah Media</title>
  <meta name="description" content="Access your project dashboard, track progress, and manage files.">
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --navy:#0A0F2C; --navy-mid:#111A45; --gold:#C9A84C; --gold-lt:#E2C07A; --cream:#FAF6ED; --white:#FFFFFF; --grey:#8A8FA8; --font-display:'Cormorant Garamond',Georgia,serif; --font-body:'DM Sans',sans-serif; }
    body { background:var(--navy); color:var(--cream); font-family:var(--font-body); min-height:100vh; display:flex; align-items:center; justify-content:center; }
    body::before { content:''; position:fixed; inset:0; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events:none; opacity:0.6; }
    .login-container { width:100%; max-width:420px; padding:2rem; position:relative; z-index:1; }
    .login-box { background:var(--navy-mid); border:1px solid rgba(201,168,76,0.2); border-radius:16px; padding:3rem; text-align:center; }
    .logo { font-family:var(--font-display); font-size:2rem; font-weight:700; color:var(--white); margin-bottom:0.5rem; }
    .logo span { color:var(--gold); }
    .login-box h1 { font-family:var(--font-display); font-size:1.5rem; color:var(--white); margin-bottom:0.5rem; }
    .login-box p { font-size:0.9rem; color:var(--grey); margin-bottom:2rem; }
    .input-group { text-align:left; margin-bottom:1.2rem; }
    .input-group label { display:block; font-size:0.75rem; color:var(--gold); text-transform:uppercase; letter-spacing:0.1em; margin-bottom:0.5rem; }
    .input-group input { width:100%; padding:1rem; background:var(--navy); border:1px solid rgba(201,168,76,0.2); border-radius:8px; color:var(--cream); font-size:1rem; }
    .input-group input:focus { outline:none; border-color:var(--gold); }
    .login-btn { width:100%; padding:1.1rem; background:var(--gold); color:var(--navy); font-weight:700; font-size:1rem; text-transform:uppercase; letter-spacing:0.08em; border:none; border-radius:8px; cursor:pointer; margin-top:1rem; transition:all 0.3s; }
    .login-btn:hover { background:var(--gold-lt); transform:translateY(-2px); }
    .error-msg { background:rgba(239,68,68,0.15); border:1px solid rgba(239,68,68,0.3); color:#F87171; padding:0.8rem; border-radius:8px; font-size:0.85rem; margin-bottom:1rem; display:none; }
    .back-link { display:inline-block; margin-top:1.5rem; font-size:0.85rem; color:var(--grey); text-decoration:none; }
    .back-link:hover { color:var(--gold-lt); }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-box">
      <div class="logo">Hephzibah <span>Media</span></div>
      <h1>Client Portal</h1>
      <p>Access your project dashboard</p>
      <div class="error-msg" id="errorMsg">Invalid credentials. Please try again.</div>
      <form id="loginForm">
        <div class="input-group">
          <label>Email Address</label>
          <input type="email" id="email" placeholder="you@company.com" required>
        </div>
        <div class="input-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="login-btn">Access Portal</button>
      </form>
      <a href="index.html" class="back-link">← Back to Website</a>
    </div>
  </div>
  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      const validClients = {
        'client@retailplus.com': { name: 'RetailPlus Nigeria', project: 'E-commerce Website', password: 'retail2026' },
        'info@techcorp.com': { name: 'TechCorp Nigeria', project: 'SEO Campaign', password: 'tech2026' },
        'admin@bella.com': { name: 'Bella Spa', project: 'Brand Identity', password: 'bella2026' }
      };
      
      if (validClients[email] && validClients[email].password === password) {
        sessionStorage.setItem('clientEmail', email);
        sessionStorage.setItem('clientName', validClients[email].name);
        sessionStorage.setItem('clientProject', validClients[email].project);
        window.location.href = 'dashboard.html';
      } else {
        document.getElementById('errorMsg').style.display = 'block';
      }
    });
  </script>
</body>
</html>
