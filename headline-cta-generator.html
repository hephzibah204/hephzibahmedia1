<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Headline & CTA Generator – Marketing Copy</title>
  <meta name="description" content="Generate powerful headlines and call-to-action buttons for your Nigerian business marketing.">
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --navy:#0A0F2C; --navy-mid:#111A45; --gold:#C9A84C; --gold-lt:#E2C07A; --cream:#FAF6ED; --white:#FFFFFF; --grey:#8A8FA8; --success:#22C55E; --font-display:'Cormorant Garamond',Georgia,serif; --font-body:'DM Sans',sans-serif; }
    body { background:var(--navy); color:var(--cream); font-family:var(--font-body); font-size:16px; line-height:1.7; overflow-x:hidden; }
    body::before { content:''; position:fixed; inset:0; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events:none; opacity:0.6; }
    .container { max-width:900px; margin:0 auto; padding:8rem 5% 4rem; position:relative; z-index:1; }
    h1 { font-family:var(--font-display); font-size:2.5rem; color:var(--white); text-align:center; margin-bottom:0.5rem; }
    h1 em { color:var(--gold-lt); font-style:italic; }
    .subtitle { text-align:center; color:var(--grey); margin-bottom:2rem; }
    .tool-tabs { display:flex; gap:1rem; margin-bottom:2rem; }
    .tab-btn { flex:1; padding:1rem; background:var(--navy-mid); border:1px solid rgba(201,168,76,0.2); border-radius:8px; color:var(--cream); font-size:0.9rem; cursor:pointer; text-align:center; transition:all 0.3s; }
    .tab-btn:hover, .tab-btn.active { background:var(--gold); color:var(--navy); border-color:var(--gold); }
    .tool-box { background:var(--navy-mid); border:1px solid rgba(201,168,76,0.2); border-radius:16px; padding:2rem; display:none; }
    .tool-box.active { display:block; }
    .input-group { margin-bottom:1.5rem; }
    .input-group label { display:block; font-size:0.75rem; color:var(--gold); text-transform:uppercase; letter-spacing:0.1em; margin-bottom:0.5rem; }
    .input-group input, .input-group select, .input-group textarea { width:100%; padding:1rem; background:var(--navy); border:1px solid rgba(201,168,76,0.2); border-radius:8px; color:var(--cream); }
    .generate-btn { width:100%; padding:1rem; background:var(--gold); color:var(--navy); font-weight:700; text-transform:uppercase; letter-spacing:0.08em; border:none; border-radius:8px; cursor:pointer; }
    .results { margin-top:2rem; display:none; }
    .results.show { display:block; }
    .result-item { background:var(--navy); border:1px solid rgba(201,168,76,0.15); border-radius:8px; padding:1.2rem; margin-bottom:1rem; cursor:pointer; transition:all 0.3s; }
    .result-item:hover { border-color:var(--gold); }
    .result-item .copy-icon { float:right; color:var(--gold); font-size:1.2rem; }
    .result-text { font-size:1.1rem; color:var(--white); }
    .result-type { font-size:0.7rem; color:var(--gold); text-transform:uppercase; letter-spacing:0.1em; margin-bottom:0.5rem; }
    .copied { background:rgba(34,197,94,0.2); border-color:var(--success); }
    footer { text-align:center; padding:2rem; font-size:0.8rem; color:var(--grey); }
  </style>
</head>
<body>
  <div class="container">
    <h1>Copy <em>Generator</em></h1>
    <p class="subtitle">Generate headlines and CTAs that convert</p>

    <div class="tool-tabs">
      <button class="tab-btn active" onclick="switchTab('headline')">📝 Headlines</button>
      <button class="tab-btn" onclick="switchTab('cta')">🔘 CTA Buttons</button>
    </div>

    <div class="tool-box active" id="headlineBox">
      <form id="headlineForm">
        <div class="input-group">
          <label>Your Product/Service</label>
          <input type="text" id="product" placeholder="e.g., Digital marketing course, Restaurant, E-commerce store" required>
        </div>
        <div class="input-group">
          <label>Main Benefit</label>
          <input type="text" id="benefit" placeholder="e.g., Get more customers, Save time, Make money">
        </div>
        <div class="input-group">
          <label>Target Audience</label>
          <select id="audience">
            <option value="entrepreneur">Entrepreneurs/Business Owners</option>
            <option value="corporate">Corporate Employees</option>
            <option value="student">Students</option>
            <option value="professional">Professionals</option>
            <option value="smb">Small Business Owners</option>
          </select>
        </div>
        <button type="submit" class="generate-btn">Generate Headlines</button>
      </form>
      <div class="results" id="headlineResults"></div>
    </div>

    <div class="tool-box" id="ctaBox">
      <form id="ctaForm">
        <div class="input-group">
          <label>Your Goal</label>
          <select id="ctaGoal">
            <option value="buy">Get Sales/Purchases</option>
            <option value="lead">Get Leads/Signups</option>
            <option value="download">Get Downloads</option>
            <option value="book">Get Bookings</option>
          </select>
        </div>
        <div class="input-group">
          <label>Urgency Level</label>
          <select id="urgency">
            <option value="none">No Urgency</option>
            <option value="limited">Limited Time Offer</option>
            <option value="urgent">Very Urgent</option>
          </select>
        </div>
        <button type="submit" class="generate-btn">Generate CTAs</button>
      </form>
      <div class="results" id="ctaResults"></div>
    </div>
  </div>

  <footer>
    <p>&copy; 2026 Hephzibah Media. All rights reserved.</p>
  </footer>

  <script>
    const headlineTemplates = {
      entrepreneur: [
        "How {product} Helped {audience} 3x Their Revenue in 90 Days",
        "The Secret to {benefit} Every {audience} Needs to Know",
        "Why Smart {audience} Are Switching to {product}",
        "Get {benefit} Without the Stress - Here's How",
        "The {product} That {audience} Can't Stop Talking About"
      ],
      corporate: [
        "Side Hustle Alert: How {audience} Earn Extra Income",
        "Unlock Your Potential with {product}",
        "What {audience} Know About {benefit} (That You Don't)",
        "Finally, a {product} That Works for Busy {audience}",
        "Level Up: {product} for Career-Driven {audience}"
      ],
      student: [
        "{product}: The Skill {audience} Need for 2026",
        "How Students Are Getting {benefit} With This {product}",
        "Boost Your CV with {product}",
        "The {product} Every {audience} Should Have",
        "Study Smart, Not Hard - With {product}"
      ],
      smb: [
        "Finally, {product} Designed for Nigerian {audience}",
        "How Local {audience} Are Growing With {product}",
        "{product}: The Secret Weapon for {audience}",
        "Stop Wasting Money - Try {product} Today",
        "The {product} That {audience} Trust"
      ]
    };

    const ctaTemplates = {
      buy: {
        none: ['Buy Now', 'Get Started', 'Order Now', 'Purchase Today'],
        limited: ['Get 50% Off - Limited Time', 'Offer Ends Soon', 'Last Chance to Buy', 'Flash Sale - 24h Only'],
        urgent: ['Buy Now Before Gone', 'Only Few Left', 'Don\'t Miss Out', 'Instant Access Now']
      },
      lead: {
        none: ['Get Free Quote', 'Sign Up Free', 'Download Guide', 'Join Waitlist'],
        limited: ['Get Free Access (Limited)', 'Claim Your Spot', 'Register Before Full', 'Get Early Bird Access'],
        urgent: ['Sign Up Now - Spots Filling', 'Don\'t Miss This', 'Join Before Closed', 'Get Access Immediately']
      },
      download: {
        none: ['Download Now', 'Get Free Guide', 'Get Template', 'Download Checklist'],
        limited: ['Free for Limited Time', 'Get Before Ends', 'Download Free Copy', 'Claim Your Copy'],
        urgent: ['Download Before Gone', 'Get It Now', 'Free Copy - Hurry', 'Download Immediately']
      },
      book: {
        none: ['Book Consultation', 'Schedule Call', 'Book Appointment', 'Book Demo'],
        limited: ['Book Before Slots Gone', 'Limited Availability', 'Book Your Spot', 'Schedule Now'],
        urgent: ['Book Immediately', 'Last Available Slots', 'Don\'t Miss - Book Now', 'Secure Your Time']
      }
    };

    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tool-box').forEach(b => b.classList.remove('active'));
      if (tab === 'headline') {
        document.querySelectorAll('.tab-btn')[0].classList.add('active');
        document.getElementById('headlineBox').classList.add('active');
      } else {
        document.querySelectorAll('.tab-btn')[1].classList.add('active');
        document.getElementById('ctaBox').classList.add('active');
      }
    }

    document.getElementById('headlineForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const product = document.getElementById('product').value;
      const benefit = document.getElementById('benefit').value;
      const audience = document.getElementById('audience').value;
      
      const templates = headlineTemplates[audience] || headlineTemplates.entrepreneur;
      const headlines = templates.map(function(t) {
        return t.replace(/{product}/g, product).replace(/{benefit}/g, benefit).replace(/{audience}/g, audience);
      });
      
      document.getElementById('headlineResults').innerHTML = '<h4 style="color:var(--white);margin-bottom:1rem;">📝 Headlines</h4>' + 
        headlines.map(function(h, i) {
          return '<div class="result-item" onclick="copyText(this, \'' + h.replace(/'/g, "\\'") + '\')"><span class="copy-icon">📋</span><div class="result-type">Option ' + (i+1) + '</div><p class="result-text">' + h + '</p></div>';
        }).join('');
      document.getElementById('headlineResults').classList.add('show');
    });

    document.getElementById('ctaForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const goal = document.getElementById('ctaGoal').value;
      const urgency = document.getElementById('urgency').value;
      
      const ctas = ctaTemplates[goal][urgency];
      
      document.getElementById('ctaResults').innerHTML = '<h4 style="color:var(--white);margin-bottom:1rem;">🔘 Call-to-Actions</h4>' + 
        ctas.map(function(c, i) {
          return '<div class="result-item" onclick="copyText(this, \'' + c.replace(/'/g, "\\'") + '\')"><span class="copy-icon">📋</span><div class="result-type">Option ' + (i+1) + '</div><p class="result-text">' + c + '</p></div>';
        }).join('');
      document.getElementById('ctaResults').classList.add('show');
    });

    function copyText(el, text) {
      navigator.clipboard.writeText(text);
      el.classList.add('copied');
      el.querySelector('.copy-icon').textContent = '✅';
      setTimeout(function() {
        el.classList.remove('copied');
        el.querySelector('.copy-icon').textContent = '📋';
      }, 2000);
    }
  </script>
</body>
</html>
